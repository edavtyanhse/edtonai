name: security-checks

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  security-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python dependency and static security checks
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit bandit || true
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt || true; else pip-audit || true; fi
          if [ -d backend ]; then bandit -r backend -x backend/tests,.venv,venv || true; fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend dependency audit
        shell: bash
        run: |
          if [ -f package-lock.json ]; then npm audit --audit-level=high || true; fi
          if [ -f frontend/package-lock.json ]; then cd frontend && npm audit --audit-level=high || true; fi

      - name: Semgrep OWASP and secrets scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/secrets
        continue-on-error: true
