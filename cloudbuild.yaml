steps:
  # ==========================================
  # 1. Backend: Build & Push
  # ==========================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Backend'
    args: ['build', '-t', '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/backend', 'backend/']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Backend'
    args: ['push', '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/backend']

  # ==========================================
  # 2. Backend: Migrate DB
  # ==========================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Migrate Backend DB'
    args:
      - 'run'
      - '--rm'
      - '-w'
      - '/app/backend'
      - '-e'
      - 'POSTGRES_USER=$_POSTGRES_USER'
      - '-e'
      - 'POSTGRES_PASSWORD=$_POSTGRES_PASSWORD'
      - '-e'
      - 'POSTGRES_HOST=$_POSTGRES_HOST'
      - '-e'
      - 'POSTGRES_PORT=$_POSTGRES_PORT'
      - '-e'
      - 'POSTGRES_DB=$_POSTGRES_DB'
      - '-e'
      - 'LOG_LEVEL=INFO'
      - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/backend'
      - 'alembic'
      - '-c'
      - 'alembic.ini'
      - 'upgrade'
      - 'head'

  # ==========================================
  # 3. Backend: Deploy
  # ==========================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Backend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_BACKEND_SERVICE_NAME'
      - '--image'
      - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/backend'
      - '--region'
      - '$_DEPLOY_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8000'
      - '--memory'
      - '2Gi'
      - '--set-env-vars'
      - 'POSTGRES_USER=$_POSTGRES_USER,POSTGRES_PASSWORD=$_POSTGRES_PASSWORD,POSTGRES_HOST=$_POSTGRES_HOST,POSTGRES_PORT=$_POSTGRES_PORT,POSTGRES_DB=$_POSTGRES_DB,AI_PROVIDER=$_AI_PROVIDER,DEEPSEEK_API_KEY=$_DEEPSEEK_API_KEY,DEEPSEEK_BASE_URL=$_DEEPSEEK_BASE_URL,AI_MODEL=$_AI_MODEL,AI_TIMEOUT_SECONDS=120,AI_MAX_RETRIES=3,AI_TEMPERATURE=0.3,AI_MAX_TOKENS=8192,LOG_LEVEL=INFO,GROQ_API_KEY=$_GROQ_API_KEY,AI_PROVIDER_PARSING=$_AI_PROVIDER_PARSING,AI_PROVIDER_REASONING=$_AI_PROVIDER_REASONING,HF_TOKEN=$_HF_TOKEN,HF_ENDPOINT_URL=$_HF_ENDPOINT_URL,DB_AUTO_CREATE=false,JWT_SECRET_KEY=$_JWT_SECRET_KEY,SMTP_HOST=smtp.yandex.ru,SMTP_PORT=465,SMTP_USERNAME=$_SMTP_USERNAME,SMTP_PASSWORD=$_SMTP_PASSWORD,SMTP_FROM_EMAIL=$_SMTP_USERNAME,FRONTEND_URL=$_FRONTEND_URL,BACKEND_URL=$_BACKEND_URL,GOOGLE_OAUTH_CLIENT_ID=$_GOOGLE_OAUTH_CLIENT_ID,GOOGLE_OAUTH_CLIENT_SECRET=$_GOOGLE_OAUTH_CLIENT_SECRET,YANDEX_OAUTH_CLIENT_ID=$_YANDEX_OAUTH_CLIENT_ID,YANDEX_OAUTH_CLIENT_SECRET=$_YANDEX_OAUTH_CLIENT_SECRET,AI_MONTHLY_FREE_QUOTA=1000000,BILLING_TEMPORARY_HIGH_FREE_QUOTA_ENABLED=true,PAYMENT_PROVIDER=disabled'

  # ==========================================
  # 4. Frontend: Build & Push
  # ==========================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Frontend'
    args:
      - 'build'
      - '-t'
      - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/frontend'
      - '--build-arg'
      - 'VITE_CLARITY_PROJECT_ID=$_VITE_CLARITY_PROJECT_ID'
      - 'frontend/'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Frontend'
    args: ['push', '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/frontend']

  # ==========================================
  # 5. Frontend: Deploy
  # ==========================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Frontend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_FRONTEND_SERVICE_NAME'
      - '--image'
      - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/frontend'
      - '--region'
      - '$_DEPLOY_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '80'
      - '--set-env-vars'
      - 'BACKEND_URL=$_BACKEND_INTERNAL_URL'

images:
  - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/backend'
  - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/frontend'

substitutions:
  _DEPLOY_REGION: us-east1
  _AR_HOSTNAME: us-east1-docker.pkg.dev
  _AR_REPO: edtonai-repo
  _BACKEND_SERVICE_NAME: edtonai-backend
  _FRONTEND_SERVICE_NAME: edtonai-frontend
  # Defaults (Non-secret)
  _POSTGRES_USER: postgres.ipnjvmwkvbvtvbgwudkl
  _POSTGRES_HOST: aws-0-eu-west-1.pooler.supabase.com
  _POSTGRES_PORT: '5432'
  _POSTGRES_DB: postgres
  _AI_PROVIDER: deepseek
  _DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
  _AI_MODEL: deepseek-chat
  _AI_PROVIDER_PARSING: groq
  _AI_PROVIDER_REASONING: deepseek
  _HF_ENDPOINT_URL: ''
  # !!! IMPORTANT: The following secrets must be set in the Cloud Build Trigger settings !!!
  # _POSTGRES_PASSWORD
  # _DEEPSEEK_API_KEY
  # _GROQ_API_KEY
  # _HF_TOKEN (HuggingFace API token — required for serverless inference)
  # _BACKEND_URL (public OAuth redirect base: https://edtonai.tech/api)
  # _BACKEND_INTERNAL_URL (Cloud Run URL for nginx proxy: https://edtonai-backend-qrmdwx6fha-ue.a.run.app)
  # _FRONTEND_URL (custom domain: https://edtonai.tech)
  # _VITE_CLARITY_PROJECT_ID (Microsoft Clarity project id)
  # _JWT_SECRET_KEY (64+ char random string for signing JWTs)
  # _SMTP_USERNAME (e.g. edtonai@yandex.com)
  # _SMTP_PASSWORD (Yandex app password)

options:
  logging: CLOUD_LOGGING_ONLY
