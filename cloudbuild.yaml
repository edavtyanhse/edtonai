steps:
  # ==========================================
  # 1. Backend: Build & Push
  # ==========================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Backend'
    args: ['build', '-t', '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/backend', 'backend/']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Backend'
    args: ['push', '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/backend']

  # ==========================================
  # 2. Backend: Migrate DB
  # ==========================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Migrate Backend DB'
    args:
      - 'run'
      - '--rm'
      - '-w'
      - '/app/backend'
      - '-e'
      - 'POSTGRES_USER=$_POSTGRES_USER'
      - '-e'
      - 'POSTGRES_PASSWORD=$_POSTGRES_PASSWORD'
      - '-e'
      - 'POSTGRES_HOST=$_POSTGRES_HOST'
      - '-e'
      - 'POSTGRES_PORT=$_POSTGRES_PORT'
      - '-e'
      - 'POSTGRES_DB=$_POSTGRES_DB'
      - '-e'
      - 'LOG_LEVEL=INFO'
      - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/backend'
      - 'alembic'
      - '-c'
      - 'alembic.ini'
      - 'upgrade'
      - 'head'

  # ==========================================
  # 3. Backend: Deploy
  # ==========================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Backend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_BACKEND_SERVICE_NAME'
      - '--image'
      - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/backend'
      - '--region'
      - '$_DEPLOY_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8000'
      - '--memory'
      - '2Gi'
      - '--set-env-vars'
      - '^|^POSTGRES_USER=$_POSTGRES_USER|POSTGRES_PASSWORD=$_POSTGRES_PASSWORD|POSTGRES_HOST=$_POSTGRES_HOST|POSTGRES_PORT=$_POSTGRES_PORT|POSTGRES_DB=$_POSTGRES_DB|AI_PROVIDER=$_AI_PROVIDER|DEEPSEEK_API_KEY=$_DEEPSEEK_API_KEY|DEEPSEEK_BASE_URL=$_DEEPSEEK_BASE_URL|AI_MODEL=$_AI_MODEL|AI_TIMEOUT_SECONDS=$_AI_TIMEOUT_SECONDS|AI_MAX_RETRIES=$_AI_MAX_RETRIES|AI_TEMPERATURE=$_AI_TEMPERATURE|AI_MAX_TOKENS=$_AI_MAX_TOKENS|LOG_LEVEL=$_LOG_LEVEL|APP_ENV=$_APP_ENV|GROQ_API_KEY=$_GROQ_API_KEY|AI_PROVIDER_PARSING=$_AI_PROVIDER_PARSING|AI_PROVIDER_REASONING=$_AI_PROVIDER_REASONING|HF_TOKEN=$_HF_TOKEN|HF_ENDPOINT_URL=$_HF_ENDPOINT_URL|DB_AUTO_CREATE=$_DB_AUTO_CREATE|JWT_SECRET_KEY=$_JWT_SECRET_KEY|JWT_ACCESS_TOKEN_EXPIRE_MINUTES=$_JWT_ACCESS_TOKEN_EXPIRE_MINUTES|JWT_REFRESH_TOKEN_EXPIRE_DAYS=$_JWT_REFRESH_TOKEN_EXPIRE_DAYS|REFRESH_COOKIE_PATH=$_REFRESH_COOKIE_PATH|SMTP_HOST=$_SMTP_HOST|SMTP_PORT=$_SMTP_PORT|SMTP_USERNAME=$_SMTP_USERNAME|SMTP_PASSWORD=$_SMTP_PASSWORD|SMTP_FROM_EMAIL=$_SMTP_FROM_EMAIL|FRONTEND_URL=$_FRONTEND_URL|BACKEND_URL=$_BACKEND_URL|GOOGLE_API_KEY=$_GOOGLE_API_KEY|GOOGLE_OAUTH_CLIENT_ID=$_GOOGLE_OAUTH_CLIENT_ID|GOOGLE_OAUTH_CLIENT_SECRET=$_GOOGLE_OAUTH_CLIENT_SECRET|YANDEX_OAUTH_CLIENT_ID=$_YANDEX_OAUTH_CLIENT_ID|YANDEX_OAUTH_CLIENT_SECRET=$_YANDEX_OAUTH_CLIENT_SECRET|SUPABASE_JWT_SECRET=$_SUPABASE_JWT_SECRET|MAX_RESUME_CHARS=$_MAX_RESUME_CHARS|MAX_VACANCY_CHARS=$_MAX_VACANCY_CHARS|AUTH_RATE_LIMIT_PER_MINUTE=$_AUTH_RATE_LIMIT_PER_MINUTE|AI_RATE_LIMIT_PER_MINUTE=$_AI_RATE_LIMIT_PER_MINUTE|SCRAPER_RATE_LIMIT_PER_MINUTE=$_SCRAPER_RATE_LIMIT_PER_MINUTE|CHECKOUT_RATE_LIMIT_PER_MINUTE=$_CHECKOUT_RATE_LIMIT_PER_MINUTE|PAYMENT_WEBHOOK_RATE_LIMIT_PER_MINUTE=$_PAYMENT_WEBHOOK_RATE_LIMIT_PER_MINUTE|PAYMENT_WEBHOOK_MAX_BODY_BYTES=$_PAYMENT_WEBHOOK_MAX_BODY_BYTES|TRUSTED_PROXY_IPS=$_TRUSTED_PROXY_IPS|AI_MONTHLY_FREE_QUOTA=$_AI_MONTHLY_FREE_QUOTA|AI_MONTHLY_TRIAL_QUOTA=$_AI_MONTHLY_TRIAL_QUOTA|BILLING_TEMPORARY_HIGH_FREE_QUOTA_ENABLED=$_BILLING_TEMPORARY_HIGH_FREE_QUOTA_ENABLED|SCRAPER_ALLOWED_HOSTS=$_SCRAPER_ALLOWED_HOSTS|SCRAPER_TIMEOUT_SECONDS=$_SCRAPER_TIMEOUT_SECONDS|SCRAPER_MAX_HTML_BYTES=$_SCRAPER_MAX_HTML_BYTES|SCRAPER_MAX_REDIRECTS=$_SCRAPER_MAX_REDIRECTS|HH_API_USER_AGENT=$_HH_API_USER_AGENT|PAYMENT_PROVIDER=$_PAYMENT_PROVIDER|PAYMENT_WEBHOOK_REPLAY_TOLERANCE_SECONDS=$_PAYMENT_WEBHOOK_REPLAY_TOLERANCE_SECONDS|TBANK_TERMINAL_KEY=$_TBANK_TERMINAL_KEY|TBANK_PUBLIC_KEY=$_TBANK_PUBLIC_KEY|TBANK_PASSWORD=$_TBANK_PASSWORD|TBANK_NOTIFICATION_URL=$_TBANK_NOTIFICATION_URL|TBANK_WEBHOOK_SECRET=$_TBANK_WEBHOOK_SECRET'

  # ==========================================
  # 4. Frontend: Build & Push
  # ==========================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Frontend'
    args:
      - 'build'
      - '-t'
      - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/frontend'
      - '--build-arg'
      - 'VITE_SUPABASE_URL=$_VITE_SUPABASE_URL'
      - '--build-arg'
      - 'VITE_SUPABASE_ANON_KEY=$_VITE_SUPABASE_ANON_KEY'
      - '--build-arg'
      - 'VITE_CLARITY_PROJECT_ID=$_VITE_CLARITY_PROJECT_ID'
      - 'frontend/'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Frontend'
    args: ['push', '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/frontend']

  # ==========================================
  # 5. Frontend: Deploy
  # ==========================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Frontend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_FRONTEND_SERVICE_NAME'
      - '--image'
      - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/frontend'
      - '--region'
      - '$_DEPLOY_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '80'
      - '--set-env-vars'
      - 'BACKEND_URL=$_BACKEND_INTERNAL_URL'

images:
  - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/backend'
  - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/frontend'

substitutions:
  _DEPLOY_REGION: us-east1
  _AR_HOSTNAME: us-east1-docker.pkg.dev
  _AR_REPO: edtonai-repo
  _BACKEND_SERVICE_NAME: edtonai-backend
  _FRONTEND_SERVICE_NAME: edtonai-frontend
  # Defaults (Non-secret)
  _POSTGRES_USER: postgres.ipnjvmwkvbvtvbgwudkl
  _POSTGRES_HOST: aws-0-eu-west-1.pooler.supabase.com
  _POSTGRES_PORT: '5432'
  _POSTGRES_DB: postgres
  _AI_PROVIDER: deepseek
  _DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
  _AI_MODEL: deepseek-chat
  _AI_TIMEOUT_SECONDS: '120'
  _AI_MAX_RETRIES: '3'
  _AI_TEMPERATURE: '0.3'
  _AI_MAX_TOKENS: '8192'
  _LOG_LEVEL: INFO
  _APP_ENV: production
  _AI_PROVIDER_PARSING: groq
  _AI_PROVIDER_REASONING: deepseek
  _HF_ENDPOINT_URL: ''
  _DB_AUTO_CREATE: 'false'
  _JWT_ACCESS_TOKEN_EXPIRE_MINUTES: '15'
  _JWT_REFRESH_TOKEN_EXPIRE_DAYS: '30'
  _REFRESH_COOKIE_PATH: /
  _SMTP_HOST: smtp.yandex.ru
  _SMTP_PORT: '465'
  _SMTP_FROM_EMAIL: ''
  _MAX_RESUME_CHARS: '15000'
  _MAX_VACANCY_CHARS: '10000'
  _AUTH_RATE_LIMIT_PER_MINUTE: '20'
  _AI_RATE_LIMIT_PER_MINUTE: '120'
  _SCRAPER_RATE_LIMIT_PER_MINUTE: '30'
  _CHECKOUT_RATE_LIMIT_PER_MINUTE: '10'
  _PAYMENT_WEBHOOK_RATE_LIMIT_PER_MINUTE: '120'
  _PAYMENT_WEBHOOK_MAX_BODY_BYTES: '16384'
  _TRUSTED_PROXY_IPS: ''
  _AI_MONTHLY_FREE_QUOTA: '5'
  _AI_MONTHLY_TRIAL_QUOTA: '100'
  _BILLING_TEMPORARY_HIGH_FREE_QUOTA_ENABLED: 'false'
  _SCRAPER_ALLOWED_HOSTS: hh.ru,hh.kz,headhunter.ru,headhunter.kz
  _SCRAPER_TIMEOUT_SECONDS: '15'
  _SCRAPER_MAX_HTML_BYTES: '1000000'
  _SCRAPER_MAX_REDIRECTS: '5'
  _HH_API_USER_AGENT: 'EdTonAI/1.0 (contact@edtonai.tech)'
  _PAYMENT_PROVIDER: disabled
  _PAYMENT_WEBHOOK_REPLAY_TOLERANCE_SECONDS: '300'
  _TBANK_TERMINAL_KEY: ''
  _TBANK_PUBLIC_KEY: ''
  _TBANK_PASSWORD: ''
  _TBANK_NOTIFICATION_URL: ''
  _TBANK_WEBHOOK_SECRET: ''
  _POSTGRES_PASSWORD: ''
  _DEEPSEEK_API_KEY: ''
  _GROQ_API_KEY: ''
  _HF_TOKEN: ''
  _JWT_SECRET_KEY: ''
  _SMTP_USERNAME: ''
  _SMTP_PASSWORD: ''
  _GOOGLE_API_KEY: ''
  _GOOGLE_OAUTH_CLIENT_ID: ''
  _GOOGLE_OAUTH_CLIENT_SECRET: ''
  _YANDEX_OAUTH_CLIENT_ID: ''
  _YANDEX_OAUTH_CLIENT_SECRET: ''
  _SUPABASE_JWT_SECRET: ''
  _BACKEND_URL: ''
  _BACKEND_INTERNAL_URL: ''
  _FRONTEND_URL: ''
  _VITE_CLARITY_PROJECT_ID: ''
  _VITE_SUPABASE_URL: ''
  _VITE_SUPABASE_ANON_KEY: ''
  # Deployment defaults. Override from local .env with:
  # scripts/submit_cloudbuild_from_env.sh .env
  #
  # If GitHub trigger is used, keep trigger substitutions in sync with .env.
  # For production, replace secret substitutions with Secret Manager references.
  #
  # !!! IMPORTANT: The following values are secrets and must not be committed !!!
  # _POSTGRES_PASSWORD
  # _DEEPSEEK_API_KEY
  # _GROQ_API_KEY
  # _HF_TOKEN (HuggingFace API token — required for serverless inference)
  # _BACKEND_URL (public OAuth redirect base: https://edtonai.tech/api)
  # _BACKEND_INTERNAL_URL (Cloud Run URL for nginx proxy: https://edtonai-backend-qrmdwx6fha-ue.a.run.app)
  # _FRONTEND_URL (custom domain: https://edtonai.tech)
  # _VITE_CLARITY_PROJECT_ID (Microsoft Clarity project id)
  # _JWT_SECRET_KEY (64+ char random string for signing JWTs)
  # _SMTP_USERNAME (e.g. edtonai@yandex.com)
  # _SMTP_PASSWORD (Yandex app password)
  # _GOOGLE_API_KEY
  # _SUPABASE_JWT_SECRET
  # _TBANK_TERMINAL_KEY
  # _TBANK_PASSWORD

options:
  logging: CLOUD_LOGGING_ONLY
